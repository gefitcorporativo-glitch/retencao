<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QG.90 · Acesso ao Sistema</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0A0A0A; --card:#141414; --border:#1E1E1E; --border2:#2A2A2A;
  --orange:#E87722; --orange-dim:rgba(232,119,34,.12); --orange-border:rgba(232,119,34,.28);
  --text:#F0F0F0; --muted:#666; --dim:#333;
  --green:#22C55E; --red:#EF4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
}

/* ── LOGO ── */
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-img{width:72px;height:72px;border-radius:18px;margin-bottom:14px}
.logo-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px}
.logo-sub{font-size:13px;color:var(--muted);letter-spacing:.06em}

/* ── CARD ── */
.login-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:32px 28px;
  width:100%;max-width:400px;
  position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--orange),transparent);
}

.card-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:24px}

/* ── FIELDS ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.field input{
  background:#111;border:1px solid var(--border2);border-radius:10px;
  padding:12px 14px;color:var(--text);font-size:14px;outline:none;
  font-family:'DM Sans',sans-serif;transition:border-color .15s;
}
.field input:focus{border-color:var(--orange)}
.field input::placeholder{color:var(--muted)}

/* ── ROLE SELECTOR ── */
.role-grid{display:flex;gap:8px;margin-bottom:20px}
.role-btn{
  flex:1;padding:10px;border-radius:10px;cursor:pointer;
  text-align:center;border:1px solid var(--border2);
  background:#111;transition:all .15s;
}
.role-btn.active{background:var(--orange-dim);border-color:var(--orange)}
.role-btn .role-icon{font-size:18px;margin-bottom:4px}
.role-btn .role-label{font-size:11px;font-weight:700;color:var(--muted)}
.role-btn.active .role-label{color:var(--orange)}

/* ── BUTTON ── */
.btn-login{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#E87722,#F59E4A);
  color:#000;font-size:15px;font-weight:800;cursor:pointer;
  font-family:'Syne',sans-serif;letter-spacing:.04em;
  transition:opacity .2s;margin-top:4px;
}
.btn-login:hover{opacity:.9}
.btn-login:disabled{background:var(--dim);color:var(--muted);cursor:default;opacity:1}

/* ── ERROR / SUCCESS ── */
.msg{
  padding:10px 14px;border-radius:8px;font-size:13px;
  margin-top:14px;line-height:1.5;display:none;
}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#EF4444}
.msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22C55E}
.msg.show{display:block}

/* ── LOADING ── */
.loading{
  display:none;align-items:center;justify-content:center;
  gap:8px;font-size:13px;color:var(--muted);margin-top:14px;
}
.loading.show{display:flex}
.spinner{
  width:16px;height:16px;border:2px solid var(--border2);
  border-top-color:var(--orange);border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FORGOT ── */
.forgot{
  text-align:center;margin-top:16px;
  font-size:12px;color:var(--muted);
}
.forgot a{color:var(--orange);text-decoration:none;cursor:pointer}
.forgot a:hover{text-decoration:underline}

/* ── FOOTER ── */
.footer{
  margin-top:28px;text-align:center;
  font-size:11px;color:var(--dim);
}

/* ── RESET FORM ── */
.reset-form{display:none}
.reset-form.show{display:block}
.main-form.hide{display:none}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ── CONFIGURAÇÃO SUPABASE ────────────────────────────────────
const SUPABASE_URL  = 'https://xpvedihpejivnkssryhc.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwdmVkaWhwZWppdm5rc3NyeWhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MzM2OTEsImV4cCI6MjA5NTMwOTY5MX0.23eRl7PSoak-YGS91N8lBLIRC0MqHRh5Su1r1Zr6CC4';
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ────────────────────────────────────────────────────
let selectedRole = 'treinador';

function selectRole(role, btn){
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── LOGIN ────────────────────────────────────────────────────
async function fazerLogin(){
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;

  // Validação básica
  if(!email || !senha){
    showError('Preencha o e-mail e a senha.');
    return;
  }

  setLoading(true);
  hideMessages();

  try {
    const { data, error } = await sbClient.auth.signInWithPassword({ email, password: senha });

    if(error){
      setLoading(false);
      if(error.message.includes('Invalid login')){
        showError('E-mail ou senha incorretos. Verifique e tente novamente.');
      } else if(error.message.includes('Email not confirmed')){
        showError('E-mail ainda não confirmado. Verifique sua caixa de entrada.');
      } else {
        showError('Erro ao fazer login: ' + error.message);
      }
      return;
    }

    // Login OK — verificar perfil no banco
    const userId = data.user.id;

    if(selectedRole === 'gestor'){
      // Verificar se é gestor
      const { data: gestor } = await sbClient
        .from('gestores')
        .select('id, nome, academia_id')
        .eq('user_id', userId)
        .single();

      if(gestor){
        showSuccess('Bem-vindo, ' + gestor.nome + '! Redirecionando...');
        setTimeout(() => {
          window.location.href = 'dashboard_gestor_v3.html';
        }, 1200);
      } else {
        showError('Perfil de gestor não encontrado. Verifique o tipo de acesso selecionado.');
        setLoading(false);
        await sbClient.auth.signOut();
      }

    } else {
      // Verificar se é treinador
      const { data: treinador } = await sbClient
        .from('treinadores')
        .select('id, nome, academia_id, tipo')
        .eq('user_id', userId)
        .single();

      if(treinador){
        // Salvar dados da sessão localmente
        localStorage.setItem('qg90_user', JSON.stringify({
          id: treinador.id,
          nome: treinador.nome,
          academiaId: treinador.academia_id,
          tipo: treinador.tipo,
          role: 'treinador'
        }));
        showSuccess('Bem-vindo, ' + treinador.nome + '! Carregando o sistema...');
        setTimeout(() => {
          window.location.href = 'sistema_integrado_v3.html';
        }, 1200);
      } else {
        showError('Perfil de treinador não encontrado. Verifique o tipo de acesso selecionado.');
        setLoading(false);
        await sbClient.auth.signOut();
      }
    }

  } catch(err) {
    setLoading(false);
    showError('Erro de conexão. Verifique sua internet e tente novamente.');
    console.error(err);
  }
}

// ── RESET SENHA ──────────────────────────────────────────────
async function enviarReset(){
  const email = document.getElementById('resetEmail').value.trim();
  if(!email){ document.getElementById('msgResetError').textContent='Digite seu e-mail.';document.getElementById('msgResetError').classList.add('show');return; }

  const { error } = await sbClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/index.html'
  });

  if(error){
    document.getElementById('msgResetError').textContent='Erro: ' + error.message;
    document.getElementById('msgResetError').classList.add('show');
  } else {
    document.getElementById('msgResetError').classList.remove('show');
    document.getElementById('msgResetSuccess').textContent='Link enviado! Verifique sua caixa de entrada.';
    document.getElementById('msgResetSuccess').classList.add('show');
  }
}

// ── UI HELPERS ───────────────────────────────────────────────
function setLoading(on){
  document.getElementById('loading').classList.toggle('show', on);
  document.getElementById('btnLogin').disabled = on;
}

function showError(msg){
  const el = document.getElementById('msgError');
  el.textContent = msg;
  el.classList.add('show');
}

function showSuccess(msg){
  const el = document.getElementById('msgSuccess');
  el.textContent = msg;
  el.classList.add('show');
}

function hideMessages(){
  document.getElementById('msgError').classList.remove('show');
  document.getElementById('msgSuccess').classList.remove('show');
}

function showReset(){
  document.getElementById('mainForm').classList.add('hide');
  document.getElementById('resetForm').classList.add('show');
}

function showLogin(){
  document.getElementById('mainForm').classList.remove('hide');
  document.getElementById('resetForm').classList.remove('show');
}

// ── VERIFICAR SESSÃO ATIVA ───────────────────────────────────
(async () => {
  try {
    const { data: { session } } = await sbClient.auth.getSession();
    const user = JSON.parse(localStorage.getItem('qg90_user') || '{}');
    if(session && user.role){
      if(user.role === 'gestor'){
        window.location.href = 'dashboard_gestor_v3.html';
      } else if(user.role === 'treinador'){
        window.location.href = 'sistema_integrado_v3.html';
      }
    } else {
      // Limpa qualquer sessão residual
      localStorage.removeItem('qg90_user');
    }
  } catch(e){
    localStorage.removeItem('qg90_user');
  }
})();
</script>
